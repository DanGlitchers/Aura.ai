<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Scambaiter Control Panel</title>
    <style>
        :root {
            --stark-blue: #00d2ff;
            --stark-dark-blue: #001a2c;
            --stark-glow: 0 0 15px rgba(0, 210, 255, 0.7);
            --bg-color: #010810;
            --panel-bg: rgba(0, 26, 44, 0.6);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 1.5em;
            color: var(--stark-blue);
            text-shadow: var(--stark-glow);
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(5px);
            position: relative;
        }

        .panel-header {
            color: var(--stark-blue);
            font-size: 1.1em;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.1);
            padding-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 210, 255, 0.1);
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .analyze-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--stark-blue);
            color: var(--stark-blue);
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--stark-glow);
        }

        .analyze-btn:hover {
            background: var(--stark-blue);
            color: var(--stark-dark-blue);
        }

        .output-display {
            height: 480px;
            overflow-y: auto;
            white-space: pre-wrap; /* שומר על ירידות שורה מה-AI */
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--stark-blue);
        }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(0, 210, 255, 0.2);
            border-top-color: var(--stark-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>SYSTEM: JARVIS</h1>
    <div style="color: var(--stark-blue);">מצב: לוחמה דיגיטלית פעילה</div>
</header>

<div class="main-container">
    <div class="panel">
        <div class="panel-header">הזנת נתונים (Input)</div>
        <textarea id="scamDataInput" placeholder="הכנס כאן את כל המידע שמצאת על הסקאמר..."></textarea>
        <button class="analyze-btn" id="analyzeBtn">הפעל בינה מלאכותית</button>
    </div>

    <div class="panel">
        <div class="panel-header">דוח מודיעין (Analysis Report)</div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            מעבד נתונים, אדוני...
        </div>
        <div id="outputDisplay" class="output-display"></div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // המפתח שביקשת להכניס
    const API_KEY = "AIzaSyCAF_ZyCB6oLxSTnJwK7sIcFMeFaRZ8Df8"; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    document.getElementById('analyzeBtn').addEventListener('click', async () => {
        const input = document.getElementById('scamDataInput').value;
        const output = document.getElementById('outputDisplay');
        const loading = document.getElementById('loading');

        if (!input) return alert("אדוני, חסר מידע לניתוח.");

        // הכנת הממשק
        output.innerHTML = '';
        loading.style.display = 'block';

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const prompt = `אתה ג'רוויס, העוזר האישי של האקר Scambaiter ישראלי. 
            קיבלת את המידע הבא על סקאמר: "${input}". 
            נתח הכל בצורה הכי מפורטת שיש:
            1. סוג העוקץ ורמת מורכבות.
            2. פרטים מזהים שחולצו (טלפונים, שמות, כתובות IP).
            3. סיכום של שיטת הפעולה שלהם.
            4. הצעה לתוכנית תקיפה נגדית (איך לבזבז להם את הזמן או להפיל אותם).
            תענה בעברית מרהיבה וטכנולוגית.`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const text = response.text();

            output.innerHTML = text;
        } catch (error) {
            output.innerHTML = "<span style='color:red;'>שגיאה בגישה למערכת: " + error.message + "</span>";
        } finally {
            loading.style.display = 'none';
        }
    });
</script>

</body>
</html>
