<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Scambaiter Control Panel</title>
    <style>
        :root {
            --stark-blue: #00d2ff;
            --stark-dark-blue: #001a2c;
            --stark-glow: 0 0 15px rgba(0, 210, 255, 0.7);
            --bg-color: #010810;
            --panel-bg: rgba(0, 26, 44, 0.6);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 10%, rgba(0, 40, 60, 0.3) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 20, 40, 0.3) 0px, transparent 50%);
            color: #fff;
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.15;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 1.5em;
            letter-spacing: 2px;
            color: var(--stark-blue);
            text-shadow: var(--stark-glow);
        }

        header .status {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }

        header .status::before {
            content: "";
            display: inline-block;
            width: 10px; height: 10px;
            background-color: #0f0;
            border-radius: 50%;
            margin-left: 10px;
            box-shadow: 0 0 10px #0f0;
            animation: pulse 2s infinite;
        }

        .main-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: rgba(0, 210, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.2);
        }

        .panel-header {
            color: var(--stark-blue);
            font-size: 1.1em;
            margin-bottom: 15px;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.1);
            padding-bottom: 10px;
        }

        /* Input Area Styles */
        textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 210, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--stark-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .file-upload-zone {
            margin-top: 15px;
            border: 2px dashed rgba(0, 210, 255, 0.2);
            border-radius: 5px;
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload-zone:hover {
            background: rgba(0, 210, 255, 0.05);
            border-color: rgba(0, 210, 255, 0.5);
            color: rgba(255, 255, 255, 0.8);
        }

        .analyze-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--stark-blue);
            color: var(--stark-blue);
            font-size: 1em;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: var(--stark-glow);
            box-shadow: var(--stark-glow);
        }

        .analyze-btn:hover {
            background: var(--stark-blue);
            color: var(--stark-dark-blue);
            text-shadow: none;
        }

        /* Output Area Styles */
        .output-display {
            height: 480px;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95em;
            line-height: 1.6;
            padding-right: 10px;
        }

        .output-display h3 {
            color: var(--stark-blue);
            margin-top: 0;
        }

        .output-display .data-item {
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .output-display .label {
            color: var(--stark-blue);
            font-weight: bold;
            margin-left: 5px;
        }

        /* Loading Animation */
        .loading {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0, 210, 255, 0.1);
            border-top-color: var(--stark-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.5; box-shadow: 0 0 5px #0f0; }
            50% { opacity: 1; box-shadow: 0 0 15px #0f0; }
            100% { opacity: 0.5; box-shadow: 0 0 5px #0f0; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 210, 255, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 210, 255, 0.5); }

    </style>
</head>
<body>

<header>
    <h1>SYSTEM: JARVIS</h1>
    <div class="status">מערכת מודיעין סקאם אקטיבית</div>
</header>

<div class="main-container">
    <div class="panel">
        <div class="panel-header">הזנת נתוני מודיעין (Data Ingest)</div>
        <textarea id="scamDataInput" placeholder="הדבק כאן הודעות SMS, אימיילים, תמלולי שיחות, או טקסט שחולץ מתמונות... ככל שתכניס יותר מידע, הניתוח יהיה מדויק יותר."></textarea>
        
        <div class="file-upload-zone">
            <span>+ גרור או לחץ להעלאת קבצים (תמונות, אודיו)</span>
        </div>
        
        <button class="analyze-btn" onclick="startAnalysis()">התחל ניתוח מערכתי</button>
    </div>

    <div class="panel" style="position: relative;">
        <div class="panel-header">דוח סיכום מודיעיני (Intelligence Report)</div>
        
        <div id="outputDisplay" class="output-display">
            <div style="color: rgba(255, 255, 255, 0.5); text-align: center; margin-top: 100px;">
                ממתין להזנת נתונים ותחילת הניתוח...
            </div>
        </div>

        <div id="loadingOverlay" class="loading">
            <div class="spinner"></div>
            <div style="color: var(--stark-blue);">מנתח נתונים...</div>
        </div>
    </div>
</div>

<script>
    function startAnalysis() {
        const inputData = document.getElementById('scamDataInput').value;
        const outputDisplay = document.getElementById('outputDisplay');
        const loadingOverlay = document.getElementById('loadingOverlay');

        if (!inputData.trim()) {
            alert('אדוני, עליך להזין נתונים לפני שנוכל להתחיל בניתוח.');
            return;
        }

        // 1. Hide output placeholder and show loading
        outputDisplay.innerHTML = '';
        outputDisplay.style.opacity = '0.3';
        loadingOverlay.style.display = 'block';

        // 2. Simulate AI processing time (Replace this with real API call later)
        setTimeout(() => {
            // 3. Hide loading and restore output opacity
            loadingOverlay.style.display = 'none';
            outputDisplay.style.opacity = '1';

            // 4. Generate a simulated "Super-Detailed" report
            generateSimulatedReport(outputDisplay, inputData);

        }, 2500); // 2.5 seconds simulation
    }

    function generateSimulatedReport(container, inputText) {
        // This function creates HTML for the report based on the input.
        // In the real version, this HTML comes from the AI model (like the Python script we discussed).

        let html = `
            <h3>דוח סיכום מבצעי: פרויקט "מגן"</h3>
            
            <div class="data-item">
                <span class="label">רמת איום:</span>
                <span style="color: #ff4444; font-weight: bold;">גבוהה מאוד (9/10)</span>
            </div>

            <div class="data-item">
                <span class="label">סוג העוקץ המזוהה:</span> עוקץ התחזות לבנק/חברת אשראי (Phishing via SMS).
            </div>

            <div class="data-item">
                <span class="label">תקציר הממצאים:</span><br>
                המערכת ניתחה את המידע שהוזן וזיהתה דפוסי פעולה של קבוצת נוכלים מאורגנת. 
                הם משתמשים בטקסט בעברית תקנית כדי ליצור אמינות, ולוחצים על הקורבן לבצע פעולה מהירה.
                המטרה הסופית היא קבלת קוד ה-OTP (קוד אימות חד פעמי) כדי להשתלט על החשבון.
            </div>

            <div class="data-item">
                <span class="label">ישויות שוחלצו:</span><br>
                - מספרי טלפון: <span style="color: #0f0;">052-1234567</span> (כנראה מספר וירטואלי).<br>
                - שמות מזויפים: "מחלקת הביטחון של בנק הפועלים".<br>
                - לינקים חשודים: http://login-poalim-security.com (שרת מאוחסן במזרח אירופה).
            </div>

            <div class="data-item">
                <span class="label">פרופיל פסיכולוגי של הנוכל:</span><br>
                משתמש בטקטיקת "הפחדה ודחיפות". מנסה לבודד את הקורבן ולמנוע ממנו להתייעץ עם גורם חיצוני.
            </div>

            <div class="data-item">
                <span class="label">תוכנית פעולה מומלצת ל-Scambaiter:</span><br>
                1. **הסחת דעת:** שתף פעולה בתחילה, אבל "תתקשה" למצוא את כרטיס האשראי.<br>
                2. **בזבוז זמן:** אמור לו שהטלפון שלך עומד להיכבות ואתה צריך למצוא מטען.<br>
                3. **לכידת מידע:** שלח לו את "לינק המלכודת" שנוצר במערכת כדי לנסות לדלות את ה-IP האמיתי שלו.<br>
                4. **סיום:** אחרי שעה, חשוף אותו בצורה משעשעת.
            </div>

            <div style="font-size: 0.8em; color: rgba(255,255,255,0.4); margin-top: 20px;">
                המערכת מוכנה לפקודתך, אדוני.
            </div>
        `;
        
        container.innerHTML = html;
    }
</script>

</body>
</html>
