<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS - SCAM INTELLIGENCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Assistant:wght@300;600&display=swap');

        :root {
            --cyan: #00f2ff;
            --blue: #0062ff;
            --dark: #020b16;
            --glass: rgba(0, 242, 255, 0.05);
            --border: rgba(0, 242, 255, 0.3);
        }

        body {
            background-color: var(--dark);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white;
            font-family: 'Assistant', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header HUD */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            background: rgba(2, 11, 22, 0.9);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            letter-spacing: 5px;
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
            font-size: 24px;
        }

        .system-stats {
            display: flex;
            gap: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--cyan);
        }

        /* Layout */
        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            padding: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        .panel {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            background: var(--border);
            padding: 8px 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        /* Input Styles */
        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--cyan);
            padding: 20px;
            font-size: 16px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .btn-analyze {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-analyze:hover {
            background: var(--cyan);
            color: var(--dark);
            box-shadow: 0 0 20px var(--cyan);
        }

        /* Output Area */
        .output-container {
            padding: 30px;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.8;
            color: #e0faff;
        }

        .output-container strong {
            color: var(--cyan);
            text-shadow: 0 0 5px var(--cyan);
        }

        /* Loading Animation */
        #loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .orbit {
            width: 60px;
            height: 60px;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scanned Data Effect */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.3);
            top: 0;
            animation: scan 4s linear infinite;
            z-index: 5;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

    </style>
</head>
<body>

<header>
    <h1>JARVIS v2.0</h1>
    <div class="system-stats">
        <div>CORE: ACTIVE</div>
        <div>THREAT LEVEL: MONITORING</div>
        <div id="clock">00:00:00</div>
    </div>
</header>

<div class="container">
    <div class="panel">
        <div class="scan-line"></div>
        <div class="panel-title"><span>DATA INGESTION</span><span>ID: 884-X</span></div>
        <textarea id="scamInput" placeholder="הכנס נתוני עוקץ גולמיים... (מספרי טלפון, צילומי מסך מתומללים, לינקים)"></textarea>
        <button class="btn-analyze" onclick="processData()">Execute Intelligence Scan</button>
    </div>

    <div class="panel">
        <div class="panel-title"><span>TACTICAL ANALYSIS REPORT</span><span>STATUS: READY</span></div>
        <div id="loader">
            <div class="orbit"></div>
            <p style="color:var(--cyan); font-family:'Orbitron';">MAPPING SCAM NETWORK...</p>
        </div>
        <div id="reportOutput" class="output-container">
            ממתין להזנת נתונים... המערכת מוכנה לסריקה.
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // ה-API KEY שלך
    const API_KEY = "AIzaSyCAF_ZyCB6oLxSTnJwK7sIcFMeFaRZ8Df8";
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.processData = async function() {
        const text = document.getElementById('scamInput').value;
        const output = document.getElementById('reportOutput');
        const loader = document.getElementById('loader');

        if (!text) return;

        // HUD Reset
        output.style.opacity = "0.2";
        loader.style.display = "block";

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const prompt = `
                נתח את המידע הבא כ-JARVIS, בינה מלאכותית מתקדמת ללוחמה בסקאמרים:
                מידע: "${text}"
                
                ענה בפורמט הבא (בעברית):
                1. **אפיון איום:** (מה העוקץ ואיך הוא עובד?)
                2. **חילוץ ישויות:** (טלפונים, שמות, כתובות או לינקים שמצאת)
                3. **פרצות במערכת הנוכל:** (איפה הם טעו או מה חלש אצלם)
                4. **פרוטוקול תגובה:** (איך לבזבז להם את הזמן הכי הרבה זמן או לחשוף אותם)
                
                תשתמש בשפה צבאית-טכנולוגית ("אדוני", "מערכות מזוהות", "פרוטוקול").
            `;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const formattedText = response.text()
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            loader.style.display = "none";
            output.style.opacity = "1";
            
            // Typewriter effect
            let i = 0;
            output.innerHTML = "";
            const interval = setInterval(() => {
                output.innerHTML = formattedText.substring(0, i);
                i += 5; // מהירות הכתיבה
                if (i >= formattedText.length) {
                    output.innerHTML = formattedText;
                    clearInterval(interval);
                }
            }, 10);

        } catch (error) {
            loader.style.display = "none";
            output.style.opacity = "1";
            output.innerHTML = "שגיאת מערכת: " + error.message;
        }
    }

    // Clock function
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
