<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS v4.0 | TACTICAL COMMAND</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Assistant:wght@200;400;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --blue: #0062ff;
            --dark: #020b16;
            --neon-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        * { box-sizing: border-box; }

        body {
            background: #010810;
            color: #fff;
            font-family: 'Assistant', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 30, 60, 0.5) 0%, #010810 100%),
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        /* Scanline Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        header {
            padding: 20px 50px;
            border-bottom: 2px solid var(--cyan);
            background: rgba(0, 10, 20, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            letter-spacing: 8px;
            color: var(--cyan);
            text-shadow: var(--neon-shadow);
            font-size: 26px;
        }

        .hud-info {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--cyan);
            text-align: left;
        }

        main {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 25px;
            padding: 30px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            background: rgba(0, 20, 40, 0.6);
            border: 1px solid var(--cyan);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .panel-header {
            background: rgba(0, 242, 255, 0.15);
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--cyan);
            border-bottom: 1px solid var(--cyan);
            display: flex;
            justify-content: space-between;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 20px;
            font-size: 18px;
            outline: none;
            resize: none;
            line-height: 1.6;
        }

        .action-area {
            padding: 20px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
        }

        .stark-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s;
        }

        .stark-btn:hover {
            background: var(--cyan);
            color: var(--dark);
            box-shadow: 0 0 40px var(--cyan);
        }

        #output {
            padding: 40px;
            overflow-y: auto;
            font-size: 20px;
            line-height: 1.8;
            color: #d1f7ff;
            height: 100%;
        }

        #output strong {
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
            display: block;
            margin-top: 20px;
        }

        /* Loading Animation */
        #loader {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .circle-loader {
            width: 100px; height: 100px;
            border: 2px solid transparent;
            border-top: 2px solid var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* HUD Decorations */
        .corner {
            position: absolute; width: 15px; height: 15px;
            border: 2px solid var(--cyan);
        }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

    </style>
</head>
<body>

<header>
    <h1>JARVIS | GLOBAL DEFENSE</h1>
    <div class="hud-info">
        <div>CORE STATUS: ACTIVE</div>
        <div id="clock">00:00:00</div>
    </div>
</header>

<main>
    <div class="panel">
        <div class="corner tl"></div><div class="corner br"></div>
        <div class="panel-header"><span>INPUT STREAM</span><span>ID: STARK-77</span></div>
        <textarea id="inputData" placeholder="הדבק נתוני מודיעין כאן..."></textarea>
        <div class="action-area">
            <button class="stark-btn" onclick="analyzeThreat()">EXECUTE TACTICAL SCAN</button>
        </div>
    </div>

    <div class="panel">
        <div class="corner tl"></div><div class="corner br"></div>
        <div class="panel-header"><span>BATTLEFIELD ANALYSIS</span><span>SECURE CONNECTION</span></div>
        <div id="loader"><div class="circle-loader"></div></div>
        <div id="output">ממתין להזנת נתונים, אדוני. המערכת סרוקה ומוכנה.</div>
    </div>
</main>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // המפתח החדש שביקשת להטמיע
    const API_KEY = "AIzaSyA886QPoQ5wd-Pji2Qh9XR1aAOscj-8ekE";
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.analyzeThreat = async function() {
        const input = document.getElementById('inputData').value;
        const out = document.getElementById('output');
        const loader = document.getElementById('loader');

        if (!input.trim()) return;

        out.style.opacity = "0.1";
        loader.style.display = "block";

        try {
            // שימוש במודל 1.5-flash עם נתיב יציב (v1)
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const prompt = `אתה JARVIS. בצע ניתוח מודיעיני מעמיק לעוקץ הבא: "${input}". 
            ענה בעברית מרהיבה, רשמית וטכנולוגית. 
            חלק ל: **אפיון איום**, **ישויות מזוהות (טלפונים/לינקים)**, **שיטת פעולה**, ו**פרוטוקול תגובה נגדית**.`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const text = response.text();

            // Formatting
            const formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            loader.style.display = "none";
            out.style.opacity = "1";
            
            // Typewriter effect
            let i = 0;
            out.innerHTML = "";
            const interval = setInterval(() => {
                out.innerHTML = formattedText.substring(0, i);
                i += 5;
                if (i >= formattedText.length) {
                    out.innerHTML = formattedText;
                    clearInterval(interval);
                }
            }, 10);

        } catch (error) {
            console.error(error);
            loader.style.display = "none";
            out.style.opacity = "1";
            out.innerHTML = `<span style="color:red;">שגיאת פרוטוקול:</span> אדוני, נראה שיש בעיה בגרסת המודל. <br> נסה ליצור מפתח חדש ב-AI Studio והחלף אותו בקוד.`;
        }
    }

    // HUD Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
