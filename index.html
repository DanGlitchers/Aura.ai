<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anon | Discord Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* איפוס בסיסי ועיצוב גופנים */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: #313338; 
            color: #dbdee1; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* סרגל שרתים (הכי ימני) */
        #servers-sidebar {
            width: 72px;
            background-color: #1e1f22;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12px;
            gap: 10px;
        }
        .server-icon {
            width: 48px;
            height: 48px;
            background-color: #313338;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: bold;
            color: #dbdee1;
        }
        .server-icon:hover {
            background-color: #5865f2;
            border-radius: 16px;
            color: white;
        }
        .server-icon.active { background-color: #5865f2; border-radius: 16px; }

        /* סרגל ערוצים (פנימי) */
        #channels-sidebar {
            width: 240px;
            background-color: #2b2d31;
            display: flex;
            flex-direction: column;
        }
        .server-header {
            padding: 16px;
            font-weight: 800;
            border-bottom: 1px solid #1f2023;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            color: white;
        }
        .channels-list { padding: 10px; flex: 1; }
        .channel-item {
            padding: 8px;
            margin-bottom: 2px;
            border-radius: 4px;
            cursor: pointer;
            color: #949ba4;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .channel-item:hover { background-color: #3f4147; color: #dbdee1; }
        .channel-item.active { background-color: #404249; color: white; }
        .hash { font-size: 1.2em; color: #80848e; }

        /* אזור הגדרות משתמש בתחתית סרגל הערוצים */
        #user-controls {
            background-color: #232428;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #username-input {
            width: 100%;
            padding: 8px;
            background: #1e1f22;
            border: none;
            border-radius: 4px;
            color: white;
            font-family: inherit;
        }

        /* אזור הצ'אט המרכזי */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #313338;
        }
        #chat-header {
            padding: 16px;
            border-bottom: 1px solid #2b2d31;
            font-weight: 600;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* עיצוב הודעה ספציפית */
        .message-wrapper {
            display: flex;
            gap: 16px;
            line-height: 1.4;
        }
        .message-wrapper:hover { background-color: #2e3035; border-radius: 4px; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #5865f2;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message-content { flex: 1; }
        .message-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
        .msg-username { font-weight: 600; color: white; font-size: 1rem; }
        .msg-timestamp { font-size: 0.75rem; color: #949ba4; }
        .msg-text { color: #dbdee1; word-break: break-word; }

        /* אזור הקלדת הודעה */
        #input-wrapper {
            padding: 0 20px 24px 20px;
        }
        .input-box {
            background-color: #383a40;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 10px 16px;
        }
        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #dbdee1;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }
        #message-input::placeholder { color: #949ba4; }

        /* פס גלילה מעוצב */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2b2d31; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #111214; }

        /* התאמה למובייל */
        @media (max-width: 768px) {
            #servers-sidebar, #channels-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <nav id="servers-sidebar">
        <div class="server-icon active">A</div>
        <div class="server-icon" style="font-size: 20px;">+</div>
    </nav>

    <aside id="channels-sidebar">
        <div class="server-header">
            הקבוצה של החבר'ה
        </div>
        <div class="channels-list">
            <div class="channel-item active">
                <span class="hash">#</span> כללי
            </div>
            <div class="channel-item">
                <span class="hash">#</span> גיימינג
            </div>
            <div class="channel-item">
                <span class="hash">#</span> ממים
            </div>
        </div>
        <div id="user-controls">
            <input type="text" id="username-input" placeholder="בחר כינוי..." value="אנונימי">
        </div>
    </aside>

    <main id="main-chat">
        <header id="chat-header">
            <span style="color: #949ba4; margin-left: 8px;">#</span> כללי
        </header>
        
        <div id="chat-messages">
            </div>

        <div id="input-wrapper">
            <div class="input-box">
                <input type="text" id="message-input" placeholder="הקלד הודעה לערוץ #כללי..." autocomplete="off">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_JNfME-T2fJTlBfInFCBXgnMXLGEapoc",
            authDomain: "anon-6c5b3.firebaseapp.com",
            databaseURL: "https://anon-6c5b3-default-rtdb.firebaseio.com",
            projectId: "anon-6c5b3",
            storageBucket: "anon-6c5b3.firebasestorage.app",
            messagingSenderId: "697842373183",
            appId: "1:697842373183:web:0f8f2259f2af6baba4de8a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        const messageInput = document.getElementById('message-input');
        const usernameInput = document.getElementById('username-input');
        const chatMessages = document.getElementById('chat-messages');

        // פונקציה לשליחת הודעה
        function sendMessage() {
            const text = messageInput.value.trim();
            const user = usernameInput.value.trim() || "אנונימי";
            
            if (text !== "") {
                push(messagesRef, {
                    username: user,
                    text: text,
                    timestamp: Date.now()
                });
                messageInput.value = ""; // איפוס תיבת הטקסט
            }
        }

        // האזנה ללחיצת Enter בשדה הטקסט
        messageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // פונקציית עזר לעיצוב השעה
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        // האזנה להודעות מהשרת בזמן אמת ויצירת הממשק
        onChildAdded(messagesRef, (data) => {
            const msg = data.val();
            const timeString = formatTime(msg.timestamp);
            
            // יצירת תמונת פרופיל אוטומטית לפי השם (חינמי ובטוח)
            const avatarUrl = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(msg.username)}&backgroundColor=5865f2`;

            // בניית מבנה ההודעה בטכניקה בטוחה מ-XSS
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'message-wrapper';

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'avatar';
            const img = document.createElement('img');
            img.src = avatarUrl;
            img.alt = msg.username;
            avatarDiv.appendChild(img);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';
            
            const usernameSpan = document.createElement('span');
            usernameSpan.className = 'msg-username';
            usernameSpan.textContent = msg.username; // textContent כדי למנוע הרצת קוד זדוני
            
            const timeSpan = document.createElement('span');
            timeSpan.className = 'msg-timestamp';
            timeSpan.textContent = timeString;

            headerDiv.appendChild(usernameSpan);
            headerDiv.appendChild(timeSpan);

            const textDiv = document.createElement('div');
            textDiv.className = 'msg-text';
            textDiv.textContent = msg.text;

            contentDiv.appendChild(headerDiv);
            contentDiv.appendChild(textDiv);

            wrapperDiv.appendChild(avatarDiv);
            wrapperDiv.appendChild(contentDiv);

            chatMessages.appendChild(wrapperDiv);

            // גלילה אוטומטית חלקה למטה
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    </script>
</body>
</html>
